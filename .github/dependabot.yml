# Configuration to manage Dependabot
# This groups updates to avoid spamming 15+ pull requests.
# It also limits the number of open pull requests.

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    
    # Group all frontend dependency updates into a single PR
    groups:
      frontend-deps:
        patterns:
          - "*"
          
    # Ignore all updates based on user request to completely silence Dependabot
    ignore:
      - dependency-name: "*"
      
    # Limit number of non-grouped open PRs
    open-pull-requests-limit: 1

  # Optionally manage GitHub Actions updates cleanly as well
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
